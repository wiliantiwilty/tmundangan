    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
      import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      const params = new URLSearchParams(window.location.search);
      const guestId = params.get("id");

      const nameEl = document.getElementById("guest-name");

      // 🔥 FUNCTION TARUH DI SINI
      async function loadGuest() {

        if (!guestId) {
          nameEl.innerText = "Tamu tidak ditemukan";
          return;
        }

        try {
          const guestRef = doc(db, "guest", guestId);
          const guestSnap = await getDoc(guestRef);

          if (!guestSnap.exists()) {
            nameEl.innerText = "Undangan tidak ditemukan";
            return;
          }

          const data = guestSnap.data();

          nameEl.innerText = "Parents of " + data.Name;

        } catch (err) {
          console.error(err);
          nameEl.innerText = "Error ambil data";
        }
      }

      // 🔥 PANGGIL DI SINI
      loadGuest();

    </script>
